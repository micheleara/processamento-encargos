spring:
  application:
    name: processamento-encargos

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: encargos-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual
    admin:
      fail-fast: false
      properties:
        retries: 3
        request.timeout.ms: 3000
        connections.max.idle.ms: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration

cloud:
  aws:
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket-name: ${AWS_S3_BUCKET_NAME}

encargos:
  batch:
    chunk-size: ${BATCH_CHUNK_SIZE:1000}
    partitions: ${BATCH_PARTITIONS:10}
    s3-key-prefix: ${S3_KEY_PREFIX:}
  kafka:
    topics:
      consulta-request: ${KAFKA_TOPIC_CONSULTA_REQUEST:encargos.conta.consulta.request}
      consulta-response: ${KAFKA_TOPIC_CONSULTA_RESPONSE:encargos.conta.consulta.response}
      lancamento-contabil: ${KAFKA_TOPIC_LANCAMENTO_CONTABIL:encargos.lancamento-contabil}
      confirmacao-contabil: ${KAFKA_TOPIC_CONFIRMACAO_CONTABIL:encargos.contabil-confirmacao}
      atualizar-saldo: ${KAFKA_TOPIC_ATUALIZAR_SALDO:encargos.conta.atualizar-saldo}
    consulta-timeout-seconds: ${KAFKA_CONSULTA_TIMEOUT_SECONDS:5}
    # local-temp-dir removido: leitura agora é feita por stream direto do S3

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
