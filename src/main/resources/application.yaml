spring:
  application:
    name: processamento-encargos

  datasource:
    url: jdbc:postgresql://localhost:5432/encargos
    username: ${DB_USERNAME:encargos}
    password: ${DB_PASSWORD:encargos}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: encargos-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  flyway:
    enabled: true
    locations: classpath:db/migration

cloud:
  aws:
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket-name: ${AWS_S3_BUCKET_NAME}

encargos:
  batch:
    chunk-size: ${BATCH_CHUNK_SIZE:1000}
    partitions: ${BATCH_PARTITIONS:10}
    s3-key-prefix: ${S3_KEY_PREFIX:}
    # local-temp-dir removido: leitura agora é feita por stream direto do S3

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
