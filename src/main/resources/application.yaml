server:
  port: 8083

spring:
  application:
    name: processamento-encargos

  datasource:
    url: jdbc:postgresql://contas-db.cjemukoiu6hf.sa-east-1.rds.amazonaws.com:5432/contasdb?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: encargos-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual
    admin:
      fail-fast: false
      properties:
        retries: 3
        request.timeout.ms: 3000
        connections.max.idle.ms: 10000

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: true

cloud:
  aws:
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket-name: ${AWS_S3_BUCKET_NAME}

encargos:
  batch:
    chunk-size: ${BATCH_CHUNK_SIZE:1000}
    partitions: ${BATCH_PARTITIONS:10}
    s3-key-prefix: ${S3_KEY_PREFIX:}
  kafka:
    topics:
      consulta-request: ${KAFKA_TOPIC_CONSULTA_REQUEST:encargos.conta.consulta.request}
      consulta-response: ${KAFKA_TOPIC_CONSULTA_RESPONSE:encargos.conta.consulta.response}
      lancamento-contabil: ${KAFKA_TOPIC_LANCAMENTO_CONTABIL:encargos.contabil.lancamento.request}
      confirmacao-contabil: ${KAFKA_TOPIC_CONFIRMACAO_CONTABIL:encargos.contabil.lancamento.response}
      atualizar-saldo: ${KAFKA_TOPIC_ATUALIZAR_SALDO:encargos.conta.atualizar-saldo}
      confirmacao-contabil-dlt: ${KAFKA_TOPIC_CONFIRMACAO_CONTABIL_DLT:encargos.contabil.lancamento.response.DLT}
      consulta-response-dlt: ${KAFKA_TOPIC_CONSULTA_RESPONSE_DLT:encargos.conta.consulta.response.DLT}
    consulta-timeout-seconds: ${KAFKA_CONSULTA_TIMEOUT_SECONDS:5}
  outbox:
    retry-interval-ms: ${OUTBOX_RETRY_INTERVAL_MS:30000}
    max-tentativas: ${OUTBOX_MAX_TENTATIVAS:5}
    # local-temp-dir removido: leitura agora é feita por stream direto do S3

resilience4j:
  circuitbreaker:
    instances:
      consultarCliente:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 5s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
